<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyWatch — Weather Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <h2>SkyWatch Weather App (Download Version)</h2>
  <input type="text" id="cityInput" placeholder="Enter city">
  <button onclick="getWeather()">Search</button>

  <div id="output"></div>

<script>
const API_KEY = "6fc7ab730ad632df5a169986dcef4805";
let isFetching = false;

async function getWeather() {
  if (isFetching) return;

  const city = document.getElementById('cityInput').value.trim();
  if (!city) {
    document.getElementById('output').innerText = "Enter city name";
    return;
  }

  isFetching = true;

  const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${API_KEY}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.cod != 200) {
      document.getElementById('output').innerText = "City not found";
      isFetching = false;
      return;
    }

    document.getElementById('output').innerHTML = `
      <h3>${data.name}, ${data.sys.country}</h3>
      <p>Temp: ${data.main.temp} °C</p>
      <p>Condition: ${data.weather[0].description}</p>
      <p>Humidity: ${data.main.humidity}%</p>
    `;

  } catch {
    document.getElementById('output').innerText = "Error fetching data";
  }

  isFetching = false;
}
</script>
</body>
</html>
