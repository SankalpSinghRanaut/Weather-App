<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyWatch — 3D Atmospheric View</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:        #060912;
      --card-bg:     rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.1);
      --accent:      #7dd3fc;
      --accent-purple: #a78bfa;
      --text:        #eef2ff;
      --muted:       #7c8db0;
    }

    body {
      min-height: 100vh;
      background: var(--deep);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      perspective: 1200px; /* Essential for 3D layout effects */
    }

    /* ── ANIMATED BACKGROUND ── */
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.15) 0%, transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(99,102,241,0.1) 0%, transparent 40%);
    }

    .app {
      position:relative; z-index:1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 50px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header { text-align:center; margin-bottom:50px; }
    .brand {
      font-family:'DM Serif Display', serif;
      font-size: 3.5rem;
      background: linear-gradient(to right, var(--accent), var(--accent-purple));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    /* ── SEARCH & SCROLL FIX ── */
    .search-wrap {
      width:100%; max-width:550px; 
      margin-bottom: 90px; /* LARGE GAP MAINTAINED */
      position: relative;
      z-index: 1000;
    }
    .search-inner {
      display:flex; background:var(--card-bg); border:1px solid var(--card-border);
      border-radius:50px; backdrop-filter:blur(15px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .search-inner input {
      flex:1; background:transparent; border:none; outline:none;
      padding:18px 28px; color:var(--text); font-size:1.05rem;
    }
    .search-inner button {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border:none; padding:12px 30px; margin:6px; border-radius:50px;
      color:#fff; font-weight:600; cursor:pointer; transition: 0.3s;
    }
    .search-inner button:hover { transform: scale(1.05); }

    #suggestions {
      position: absolute; top: 100%; left: 0; width: 100%;
      background: #0b1120; border: 1px solid var(--card-border);
      border-radius: 20px; margin-top: 12px;
      max-height: 165px; /* SCROLL FEATURE IF > 2 OPTIONS */
      overflow-y: auto; display: none;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    #suggestions div { padding: 14px 24px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
    #suggestions div:hover { background: rgba(125,211,252,0.1); }

    /* ── 3D GRID LAYOUT ── */
    .main-grid {
      width:100%; display:grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 40px; /* INCREASED GAP BETWEEN BOXES */
      align-items: start;
    }

    .card {
      background:var(--card-bg); border:1px solid var(--card-border);
      border-radius:32px; backdrop-filter:blur(25px);
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .card:hover { transform: translateY(-5px) rotateX(2deg); }

    /* ── 3D MAP STYLING ── */
    .map-container {
      position: relative;
      height: 500px;
      border-radius: 32px;
      overflow: hidden;
      /* The 3D effect: Tilted perspective */
      transform: rotateX(10deg) rotateY(-5deg);
      box-shadow: -20px 20px 50px rgba(0,0,0,0.5);
      border: 1px solid var(--card-border);
    }
    #map { height: 100%; width: 100%; z-index: 1; filter: saturate(1.2); }

    /* ── WEATHER CONTENT ── */
    .card-top { padding:40px; }
    .temp-big { font-family:'DM Serif Display',serif; font-size:5.5rem; line-height:1; color: var(--accent); }
    
    .stats { display:grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--card-border); }
    .stat { padding:25px; border-right: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); }
    .stat-lbl { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
    .stat-val { font-family:'DM Serif Display',serif; font-size:1.6rem; margin-top:5px; }

    .w-content { display: none; }
    .w-content.show { display: block; animation: fadeIn 0.8s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .state-block { padding: 80px 40px; text-align: center; color: var(--muted); font-size: 1.1rem; }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .map-container { transform: none; height: 350px; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">SkyWatch</div>
    <p style="color:var(--muted); font-size:0.85rem; letter-spacing:4px; font-weight:500;">PREMIUM WEATHER ENGINE</p>
  </header>

  <div class="search-wrap">
    <div class="search-inner">
      <input id="cityInput" type="text" placeholder="Explore a city..." autocomplete="off">
      <button onclick="getWeather()">Search</button>
    </div>
    <div id="suggestions"></div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div id="statePlaceholder" class="state-block">
        <span style="font-size: 3rem; display:block; margin-bottom:15px;">🌍</span>
        Select a global destination
      </div>
      
      <div class="w-content" id="wContent">
        <div class="card-top">
          <p id="cityDisplay" style="color:var(--accent-purple); font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;"></p>
          <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div id="tempDisplay" class="temp-big">--°</div>
            <img id="weatherIcon" src="" style="width:110px; filter: drop-shadow(0 0 15px var(--accent));">
          </div>
          <p id="condition" style="font-size:1.2rem; color:var(--text); margin-top:10px; text-transform:capitalize;"></p>
        </div>
        
        <div class="stats">
          <div class="stat"><div class="stat-lbl">Humidity</div><div class="stat-val" id="hum">--</div></div>
          <div class="stat"><div class="stat-lbl">Wind</div><div class="stat-val" id="wind">--</div></div>
          <div class="stat"><div class="stat-lbl">Pressure</div><div class="stat-val" id="pres">--</div></div>
          <div class="stat"><div class="stat-lbl">Visibility</div><div class="stat-val" id="vis">--</div></div>
        </div>
      </div>
    </div>

    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>
</div>

<script>
  const API_KEY = '6fc7ab730ad632df5a169986dcef4805';
  
  // Initialize Map with Dark Voyager tiles for high contrast
  const map = L.map('map', { center: [20, 0], zoom: 2, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png').addTo(map);

  // Map Click Logic
  map.on('click', (e) => fetchWeather(e.latlng.lat, e.latlng.lng));

  // Search Logic
  const input = document.getElementById('cityInput');
  const suggs = document.getElementById('suggestions');

  input.addEventListener('input', async () => {
    if(input.value.length < 3) { suggs.style.display = 'none'; return; }
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}`);
      const data = await res.json();
      if(data.length > 0) {
        suggs.innerHTML = data.map(i => `<div onclick="selectCity('${i.display_name.replace(/'/g, "")}', ${i.lat}, ${i.lon})">${i.display_name}</div>`).join('');
        suggs.style.display = 'block';
      }
    } catch(e) { console.error(e); }
  });

  function selectCity(name, lat, lon) {
    input.value = name.split(',')[0];
    suggs.style.display = 'none';
    fetchWeather(lat, lon);
  }

  async function fetchWeather(lat, lon) {
    document.getElementById('statePlaceholder').style.display = 'none';
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
    const d = await res.json();

    document.getElementById('cityDisplay').innerText = d.name;
    document.getElementById('tempDisplay').innerText = Math.round(d.main.temp) + "°";
    document.getElementById('hum').innerText = d.main.humidity + "%";
    document.getElementById('wind').innerText = Math.round(d.wind.speed * 3.6) + " km/h";
    document.getElementById('pres').innerText = d.main.pressure + " hPa";
    document.getElementById('vis').innerText = (d.visibility/1000).toFixed(1) + " km";
    document.getElementById('condition').innerText = d.weather[0].description;
    document.getElementById('weatherIcon').src = `https://openweathermap.org/img/wn/${d.weather[0].icon}@4x.png`;

    document.getElementById('wContent').classList.add('show');
    
    // Zoom in animation
    map.flyTo([lat, lon], 12, { animate: true, duration: 1.5 });
  }

  function getWeather() {
    const val = input.value;
    if(val) fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`)
      .then(r => r.json()).then(d => d[0] && fetchWeather(d[0].lat, d[0].lon));
  }
</script>
</body>
</html>
