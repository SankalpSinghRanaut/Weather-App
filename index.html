<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SkyWatch — Intelligence Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --deep: #020408;
      --card-bg: rgba(0, 0, 0, 0.4);
      --card-border: rgba(255, 255, 255, 0.1);
      --accent: #38bdf8;
      --text: #f8fafc;
      --muted: #94a3b8;
      --bg-grad: linear-gradient(180deg, #020408 0%, #0f172a 100%);
    }

    body { 
      height: 100vh; width: 100vw; 
      background: var(--bg-grad); 
      color: var(--text); 
      font-family: 'DM Sans', sans-serif; 
      overflow: hidden; 
      display: flex; flex-direction: column;
      transition: background 1s ease;
    }

    /* Dynamic Weather Backgrounds */
    body.clear { background: linear-gradient(180deg, #0ea5e9 0%, #38bdf8 100%); }
    body.clouds { background: linear-gradient(180deg, #64748b 0%, #94a3b8 100%); }
    body.rain { background: linear-gradient(180deg, #1e293b 0%, #334155 100%); }
    body.night { background: linear-gradient(180deg, #020617 0%, #0f172a 100%); }

    .app { height: 100%; width: 100%; max-width: 1600px; margin: 0 auto; padding: 1.5vh 20px; display: flex; flex-direction: column; gap: 1.5vh; position: relative; z-index: 1; }
    
    header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .brand { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

    .search-area { width: 100%; max-width: 500px; margin: 0 auto; position: relative; z-index: 1000; }
    .search-box { display: flex; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; backdrop-filter: blur(20px); }
    .search-box input { flex: 1; background: transparent; border: none; outline: none; padding: 12px 24px; color: #fff; }
    .search-box button { background: #fff; border: none; padding: 6px 20px; margin: 4px; border-radius: 50px; color: #000; font-weight: 700; cursor: pointer; }

    #suggestions { position: absolute; top: 110%; left: 0; width: 100%; background: #0f172a; border-radius: 12px; display: none; max-height: 150px; overflow-y: auto; border: 1px solid var(--card-border); }
    #suggestions div { padding: 10px 20px; cursor: pointer; border-bottom: 1px solid var(--card-border); font-size: 0.85rem; }

    .main-grid { flex: 1; display: grid; grid-template-columns: 460px 1fr; gap: 20px; min-height: 0; }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; backdrop-filter: blur(10px); }
    
    .w-panel { display: none; height: 100%; flex-direction: column; padding: 24px; overflow-y: auto; }
    .w-panel.active { display: flex; }

    /* Alert Banner */
    #alertBanner { background: #ef4444; color: white; padding: 8px 15px; border-radius: 12px; margin-bottom: 15px; font-size: 0.75rem; font-weight: 700; display: none; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    /* Info Grid */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
    .info-box { background: rgba(255,255,255,0.05); padding: 14px; border-radius: 18px; border: 1px solid var(--card-border); }
    .info-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .info-val { font-size: 1.2rem; font-weight: 700; }

    /* AQI Badge */
    .aqi-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-top: 5px; }

    .sun-row { display: flex; justify-content: space-around; margin: 10px 0; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--card-border); }
    .forecast-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
    .f-item { text-align: center; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 15px; border: 1px solid var(--card-border); }

    #map { height: 100%; width: 100%; filter: contrast(1.1) brightness(0.9); }

    @media (max-width: 900px) { body { overflow-y: auto; height: auto; } .main-grid { grid-template-columns: 1fr; } #map { height: 350px; } }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">SkyWatch Pro</div>
  </header>

  <div class="search-area">
    <div class="search-box">
      <input id="cityInput" type="text" placeholder="Search City (e.g. Nagrota Bagwan)..." autocomplete="off">
      <button onclick="getWeather()">Search</button>
    </div>
    <div id="suggestions"></div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div id="placeholder" style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--muted); padding:40px; text-align:center;">
        Awaiting coordinates for intelligence briefing...
      </div>
      
      <div id="weatherPanel" class="w-panel">
        <div id="alertBanner">⚠️ SEVERE WEATHER ALERT IN EFFECT</div>

        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <p id="cityTitle" style="color:var(--accent); font-weight:bold; letter-spacing:1px;"></p>
            <h1 id="tempVal" style="font-family:'DM Serif Display'; font-size: 4rem; line-height:1; margin:5px 0;">--°</h1>
            <div id="aqiBox" class="aqi-badge" style="background:#22c55e;">AQI: --</div>
          </div>
          <img id="wIcon" src="" style="width:90px;">
        </div>

        <div class="info-grid">
          <div class="info-box"><div class="info-lbl">Feels Like</div><div class="info-val" id="feelsVal">--</div></div>
          <div class="info-box"><div class="info-lbl">Air Quality</div><div class="info-val" id="aqiVal">--</div></div>
          <div class="info-box"><div class="info-lbl">Wind Speed</div><div class="info-val" id="windVal">--</div></div>
          <div class="info-box"><div class="info-lbl">Dew Point</div><div class="info-val" id="dewVal">--</div></div>
          <div class="info-box"><div class="info-lbl">Pressure</div><div class="info-val" id="presVal">--</div></div>
          <div class="info-box"><div class="info-lbl">Humidity</div><div class="info-val" id="humVal">--</div></div>
        </div>

        <div class="sun-row">
          <div style="text-align:center;"><span style="font-size:1.3rem;">🌅</span><span id="sunrise" style="display:block; font-weight:700;">--:--</span></div>
          <div style="text-align:center;"><span style="font-size:1.3rem;">🌇</span><span id="sunset" style="display:block; font-weight:700;">--:--</span></div>
        </div>

        <div class="forecast-grid" id="forecastGrid"></div>
      </div>
    </div>

    <div class="card"><div id="map"></div></div>
  </div>
</div>

<script>
  const API_KEY = '6fc7ab730ad632df5a169986dcef4805';
  let currentMarker = null;

  const map = L.map('map', { center: [32.105, 76.379], zoom: 10, zoomControl: false, attributionControl: false });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

  map.on('click', (e) => fetchWeather(e.latlng.lat, e.latlng.lng));

  async function fetchWeather(lat, lon) {
    document.getElementById('placeholder').style.display = 'none';
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker([lat, lon]).addTo(map);

    try {
      const [curr, fore, aqi] = await Promise.all([
        fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`).then(r => r.json()),
        fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`).then(r => r.json()),
        fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`).then(r => r.json())
      ]);
      updateUI(curr, fore, aqi);
      map.flyTo([lat, lon], 12);
    } catch(e) { console.error("Data error", e); }
  }

  function updateUI(d, f, a) {
    const mainWeather = d.weather[0].main.toLowerCase();
    document.body.className = mainWeather; // Set Dynamic Background

    document.getElementById('cityTitle').innerText = d.name || "Station Beta";
    document.getElementById('tempVal').innerText = Math.round(d.main.temp) + "°";
    document.getElementById('wIcon').src = `https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;
    
    // Hyper-Local Data
    document.getElementById('feelsVal').innerText = Math.round(d.main.feels_like) + "°";
    document.getElementById('windVal').innerText = (d.wind.speed * 3.6).toFixed(1) + " km/h";
    document.getElementById('presVal').innerText = d.main.pressure + " hPa";
    document.getElementById('humVal').innerText = d.main.humidity + "%";
    
    // Dew Point Calculation (Approximation)
    const dewPoint = d.main.temp - ((100 - d.main.humidity) / 5);
    document.getElementById('dewVal').innerText = Math.round(dewPoint) + "°";

    // AQI Logic
    const aqiVal = a.list[0].main.aqi;
    const aqiMap = {1: 'Good', 2: 'Fair', 3: 'Moderate', 4: 'Poor', 5: 'Hazardous'};
    const aqiColors = {1: '#22c55e', 2: '#eab308', 3: '#f97316', 4: '#ef4444', 5: '#7f1d1d'};
    document.getElementById('aqiVal').innerText = aqiMap[aqiVal];
    document.getElementById('aqiBox').innerText = `AQI: ${aqiMap[aqiVal]}`;
    document.getElementById('aqiBox').style.background = aqiColors[aqiVal];

    // Alerts (Simulation for this demo based on extreme conditions)
    document.getElementById('alertBanner').style.display = (d.wind.speed > 15 || d.main.temp > 40) ? 'block' : 'none';

    const formatTime = (ts) => new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('sunrise').innerText = formatTime(d.sys.sunrise);
    document.getElementById('sunset').innerText = formatTime(d.sys.sunset);

    const grid = document.getElementById('forecastGrid');
    grid.innerHTML = "";
    f.list.filter((_, i) => i % 8 === 0).forEach(day => {
      const date = new Date(day.dt * 1000).toLocaleDateString('en', { weekday: 'short' });
      grid.innerHTML += `
        <div class="f-item">
          <div style="font-size:0.6rem; color:var(--muted);">${date}</div>
          <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}.png" style="width:25px;">
          <div style="font-weight:700; font-size:0.8rem;">${Math.round(day.main.temp)}°</div>
        </div>
      `;
    });

    document.getElementById('weatherPanel').classList.add('active');
  }

  // Search Logic
  const input = document.getElementById('cityInput');
  const suggs = document.getElementById('suggestions');
  input.addEventListener('input', async () => {
    if(input.value.length < 3) { suggs.style.display = 'none'; return; }
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}`);
    const data = await res.json();
    if(data.length > 0) {
      suggs.innerHTML = data.map(i => `<div onclick="selectCity('${i.display_name.replace(/'/g, "")}', ${i.lat}, ${i.lon})">${i.display_name}</div>`).join('');
      suggs.style.display = 'block';
    }
  });

  function selectCity(name, lat, lon) {
    input.value = name.split(',')[0];
    suggs.style.display = 'none';
    fetchWeather(lat, lon);
  }

  function getWeather() {
    const val = input.value;
    if(val) fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`).then(r => r.json()).then(d => d[0] && fetchWeather(d[0].lat, d[0].lon));
  }
</script>
</body>
</html>
