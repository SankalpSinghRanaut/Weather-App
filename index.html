<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyWatch — Weather Forecast</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL UI EXACT — NO CHANGES */
body {
  background: #0b0f1a;
  color: white;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  justify-content: center;
  padding: 40px;
}
.app { max-width: 500px; width: 100%; }
input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}
button { cursor: pointer; background: #38bdf8; color: white; }
.card {
  margin-top: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}
.error { color: red; }
</style>
</head>

<body>

<div class="app">

<h1>SkyWatch</h1>

<input id="cityInput" placeholder="Enter city" />
<button onclick="getWeather()">Search</button>

<div id="error" class="error"></div>

<div class="card" id="card" style="display:none;">
  <h2 id="city"></h2>
  <h1 id="temp"></h1>
  <p id="condition"></p>
  <p id="feels"></p>

  <p>Humidity: <span id="humidity"></span></p>
  <p>Pressure: <span id="pressure"></span></p>
  <p>Wind: <span id="wind"></span></p>
  <p>Visibility: <span id="visibility"></span></p>

  <p>Sunrise: <span id="sunrise"></span></p>
  <p>Sunset: <span id="sunset"></span></p>
</div>

</div>

<script>
const API_KEY = "6fc7ab730ad632df5a169986dcef4805";
let isFetching = false;

function formatTime(unix, offset) {
  const d = new Date((unix + offset) * 1000);
  let h = d.getUTCHours(), m = d.getUTCMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ":" + String(m).padStart(2,'0') + " " + ampm;
}

async function getWeather() {
  if (isFetching) return;

  const city = document.getElementById('cityInput').value.trim();
  const errorEl = document.getElementById('error');

  if (!city) {
    errorEl.innerText = "Enter city name";
    return;
  }

  isFetching = true;
  errorEl.innerText = "";

  const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${API_KEY}`;

  try {
    const res = await fetch(url);

    if (!res.ok) throw new Error("HTTP error");

    const data = await res.json();

    if (parseInt(data.cod) !== 200) {
      errorEl.innerText = data.message || "City not found";
      isFetching = false;
      return;
    }

    render(data);

  } catch (err) {
    console.error(err);
    errorEl.innerText = "API error or network issue";
  }

  isFetching = false;
}

function render(d) {
  document.getElementById('card').style.display = "block";

  document.getElementById('city').innerText =
    d.name + ", " + d.sys.country;

  document.getElementById('temp').innerText =
    Math.round(d.main.temp) + "°C";

  document.getElementById('condition').innerText =
    d.weather[0].description;

  document.getElementById('feels').innerText =
    "Feels like " + Math.round(d.main.feels_like) + "°C";

  document.getElementById('humidity').innerText =
    d.main.humidity + "%";

  document.getElementById('pressure').innerText =
    d.main.pressure + " hPa";

  document.getElementById('wind').innerText =
    Math.round(d.wind.speed * 3.6) + " km/h";

  document.getElementById('visibility').innerText =
    (d.visibility / 1000).toFixed(1) + " km";

  document.getElementById('sunrise').innerText =
    formatTime(d.sys.sunrise, d.timezone);

  document.getElementById('sunset').innerText =
    formatTime(d.sys.sunset, d.timezone);
}
</script>

</body>
</html>
