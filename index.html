<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SkyWatch 3D — Fixed View</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.js"></script>
  <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --deep: #05070a;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #38bdf8;
      --text: #f8fafc;
      --muted: #94a3b8;
    }
    body {
      height: 100vh; width: 100vw; background: var(--deep);
      color: var(--text); font-family: 'DM Sans', sans-serif;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .app { height: 100%; width: 100%; max-width: 1400px; margin: 0 auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
    
    header { text-align: center; }
    .brand { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--accent); }

    .search-area { width: 100%; max-width: 500px; margin: 0 auto; position: relative; z-index: 1000; }
    .search-box { display: flex; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 50px; backdrop-filter: blur(10px); }
    .search-box input { flex: 1; background: transparent; border: none; outline: none; padding: 12px 20px; color: #fff; }
    .search-box button { background: var(--accent); border: none; padding: 8px 20px; margin: 4px; border-radius: 50px; color: #000; font-weight: 700; cursor: pointer; }

    #suggestions { position: absolute; top: 110%; left: 0; width: 100%; background: #0f172a; border-radius: 12px; display: none; max-height: 150px; overflow-y: auto; }
    #suggestions div { padding: 10px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; }

    .main-grid { flex: 1; display: grid; grid-template-columns: 350px 1fr; gap: 20px; min-height: 0; }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; overflow: hidden; }
    
    /* Stats Styling */
    .w-panel { display: none; height: 100%; flex-direction: column; }
    .w-panel.active { display: flex; }
    .w-top { padding: 25px; }
    .temp-big { font-family: 'DM Serif Display', serif; font-size: 4rem; line-height: 1; margin: 10px 0; color: var(--accent); }
    .stats-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--card-border); }
    .stat-item { padding: 20px; border-right: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); }
    .stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
    .stat-val { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }

    #map { height: 100%; width: 100%; background: #000; }

    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; overflow-y: auto; } #map { height: 300px; } }
  </style>
</head>
<body>

<div class="app">
  <header><div class="brand">SkyWatch 3D</div></header>

  <div class="search-area">
    <div class="search-box">
      <input id="cityInput" type="text" placeholder="Enter city..." autocomplete="off">
      <button onclick="getWeather()">Search</button>
    </div>
    <div id="suggestions"></div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div id="placeholder" style="padding:40px; text-align:center; color:var(--muted);">Search a city to see 3D weather data</div>
      <div id="weatherPanel" class="w-panel">
        <div class="w-top">
          <p id="cityTitle" style="color:var(--accent); letter-spacing:2px; font-weight:bold;"></p>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 id="tempVal" class="temp-big">--°</h1>
            <img id="wIcon" src="" style="width:70px;">
          </div>
          <p id="wDesc" style="text-transform:capitalize; color:var(--muted);"></p>
        </div>
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-label">Humidity</div><div class="stat-val" id="humVal">--</div></div>
          <div class="stat-item"><div class="stat-label">Wind</div><div class="stat-val" id="windVal">--</div></div>
          <div class="stat-item"><div class="stat-label">Pressure</div><div class="stat-val" id="presVal">--</div></div>
          <div class="stat-item"><div class="stat-label">Visibility</div><div class="stat-val" id="visVal">--</div></div>
        </div>
      </div>
    </div>

    <div class="card"><div id="map"></div></div>
  </div>
</div>

<script>
  // Replace this key if the map is still blank!
  maptilerjs.config.apiKey = 'VCdMhUr0QcAVS4RKSIlp'; 

  const map = new maptilerjs.Map({
    container: 'map',
    style: maptilerjs.MapStyle.STREETS.DARK,
    center: [0, 20],
    zoom: 1.5,
    projection: 'globe', // Forced 3D Globe view
    terrain: true
  });

  map.on('load', () => { console.log("Map Loaded Successfully"); });
  map.on('error', () => { alert("Map failed to load. Please check your MapTiler API Key."); });

  const input = document.getElementById('cityInput');
  const suggs = document.getElementById('suggestions');

  input.addEventListener('input', async () => {
    if(input.value.length < 3) { suggs.style.display = 'none'; return; }
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}`);
    const data = await res.json();
    if(data.length > 0) {
      suggs.innerHTML = data.map(i => `<div onclick="selectCity('${i.display_name.replace(/'/g, "")}', ${i.lat}, ${i.lon})">${i.display_name}</div>`).join('');
      suggs.style.display = 'block';
    }
  });

  function selectCity(name, lat, lon) {
    input.value = name.split(',')[0];
    suggs.style.display = 'none';
    fetchWeather(lat, lon);
  }

  async function fetchWeather(lat, lon) {
    document.getElementById('placeholder').style.display = 'none';
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=6fc7ab730ad632df5a169986dcef4805`);
    const d = await res.json();

    document.getElementById('cityTitle').innerText = d.name;
    document.getElementById('tempVal').innerText = Math.round(d.main.temp) + "°";
    document.getElementById('humVal').innerText = d.main.humidity + "%";
    document.getElementById('windVal').innerText = Math.round(d.wind.speed * 3.6) + " km/h";
    document.getElementById('presVal').innerText = d.main.pressure + " hPa";
    document.getElementById('visVal').innerText = (d.visibility/1000).toFixed(1) + " km";
    document.getElementById('wDesc').innerText = d.weather[0].description;
    document.getElementById('wIcon').src = `https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;
    document.getElementById('weatherPanel').classList.add('active');

    map.flyTo({ center: [lon, lat], zoom: 14, pitch: 70, bearing: 40, duration: 4000 });
  }

  function getWeather() {
    const val = input.value;
    if(val) fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`)
      .then(r => r.json()).then(d => d[0] && fetchWeather(d[0].lat, d[0].lon));
  }
</script>
</body>
</html>
