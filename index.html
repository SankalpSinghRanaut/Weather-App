<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyWatch — Weather Forecast</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:        #080c17;
      --card-bg:     rgba(255,255,255,0.045);
      --card-border: rgba(255,255,255,0.09);
      --accent:      #7dd3fc;
      --accent-warm: #fbbf24;
      --accent-purple: #a78bfa;
      --text:        #eef2ff;
      --muted:       #7c8db0;
      --glow:        rgba(125,211,252,0.14);
    }

    body {
      min-height: 100vh;
      background: var(--deep);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── SKY GRADIENT ── */
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse 90% 55% at 15% -5%,  rgba(56,189,248,.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 105%, rgba(99,102,241,.11) 0%, transparent 55%);
    }

    .app {
      position:relative; z-index:1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header { text-align:center; margin-bottom:40px; }
    .brand {
      font-family:'DM Serif Display', serif;
      font-size: 3rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-purple) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    /* ── SEARCH FIXES ── */
    .search-wrap {
      width:100%; max-width:520px; 
      margin-bottom: 80px; /* INCREASED GAP TO CONTENT */
      position: relative;
      z-index: 1000; /* Ensure dropdown is top-most */
    }
    .search-inner {
      display:flex;
      background:var(--card-bg); border:1px solid var(--card-border);
      border-radius:50px; backdrop-filter:blur(14px);
    }
    .search-inner input {
      flex:1; background:transparent; border:none; outline:none;
      padding:16px 24px; color:var(--text); font-size:1rem;
    }
    .search-inner button {
      background:linear-gradient(135deg,#38bdf8,#818cf8);
      border:none; padding:10px 24px; margin:5px; border-radius:50px;
      color:#fff; font-weight:500; cursor:pointer;
    }

    #suggestions {
      position: absolute;
      top: 100%; left: 0; width: 100%;
      background: #0f172a;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      margin-top: 10px;
      max-height: 160px; /* SCROLL TRIGGER FOR > 2 OPTIONS */
      overflow-y: auto;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #suggestions div {
      padding: 12px 20px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    #suggestions div:hover { background: rgba(255,255,255,0.1); }

    /* ── GRID FIXES ── */
    .main-grid {
      width:100%; display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 32px; /* INCREASED GAP BETWEEN BOXES */
    }

    .card {
      background:var(--card-bg); border:1px solid var(--card-border);
      border-radius:28px; backdrop-filter:blur(20px); overflow:hidden;
    }

    .card-top { padding:30px; }
    .temp-big { font-family:'DM Serif Display',serif; font-size:5rem; line-height:1; }
    
    .stats { display:grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--card-border); }
    .stat { padding:20px; border-right: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); }
    .stat-lbl { font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
    .stat-val { font-family:'DM Serif Display',serif; font-size:1.4rem; }

    #map { height: 450px; width: 100%; z-index: 1; }

    .w-content { display: none; }
    .w-content.show { display: block; }
    .state-block { padding: 60px; text-align: center; color: var(--muted); }

    @media (max-width: 850px) {
      .main-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">SkyWatch</div>
    <p style="color:var(--muted); font-size:0.8rem; letter-spacing:2px;">LIVE ATMOSPHERIC DATA</p>
  </header>

  <div class="search-wrap">
    <div class="search-inner">
      <input id="cityInput" type="text" placeholder="Enter city name..." autocomplete="off">
      <button onclick="getWeather()">Search</button>
    </div>
    <div id="suggestions"></div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div id="statePlaceholder" class="state-block">Waiting for location...</div>
      
      <div class="w-content" id="wContent">
        <div class="card-top">
          <p id="cityDisplay" style="color:var(--accent); font-weight:500; margin-bottom:10px;"></p>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="tempDisplay" class="temp-big">--°</div>
            <img id="weatherIcon" src="" style="width:100px;">
          </div>
          <p id="condition" style="font-style:italic; color:var(--muted); text-transform:capitalize;"></p>
        </div>
        
        <div class="stats">
          <div class="stat"><div class="stat-lbl">Humidity</div><div class="stat-val" id="hum">--</div></div>
          <div class="stat"><div class="stat-lbl">Wind Speed</div><div class="stat-val" id="wind">--</div></div>
          <div class="stat"><div class="stat-lbl">Pressure</div><div class="stat-val" id="pres">--</div></div>
          <div class="stat"><div class="stat-lbl">Visibility</div><div class="stat-val" id="vis">--</div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div id="map"></div>
    </div>
  </div>
</div>

<script>
  const API_KEY = '6fc7ab730ad632df5a169986dcef4805';
  const map = L.map('map', { center: [20, 78], zoom: 4, attributionControl: false });
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

  // ── MAP CLICK FIX ──
  map.on('click', (e) => {
    fetchWeather(e.latlng.lat, e.latlng.lng);
  });

  // ── SEARCH & SUGGESTIONS ──
  const input = document.getElementById('cityInput');
  const suggs = document.getElementById('suggestions');

  input.addEventListener('input', async () => {
    if(input.value.length < 3) { suggs.style.display = 'none'; return; }
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}`);
    const data = await res.json();
    
    if(data.length > 0) {
      suggs.innerHTML = data.map(i => `<div onclick="selectCity('${i.display_name}', ${i.lat}, ${i.lon})">${i.display_name}</div>`).join('');
      suggs.style.display = 'block';
    }
  });

  function selectCity(name, lat, lon) {
    input.value = name;
    suggs.style.display = 'none';
    fetchWeather(lat, lon);
  }

  async function fetchWeather(lat, lon) {
    document.getElementById('statePlaceholder').style.display = 'none';
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
    const d = await res.json();

    document.getElementById('cityDisplay').innerText = d.name;
    document.getElementById('tempDisplay').innerText = Math.round(d.main.temp) + "°";
    document.getElementById('hum').innerText = d.main.humidity + "%";
    document.getElementById('wind').innerText = Math.round(d.wind.speed * 3.6) + " km/h";
    document.getElementById('pres').innerText = d.main.pressure + " hPa";
    document.getElementById('vis').innerText = (d.visibility/1000).toFixed(1) + " km";
    document.getElementById('condition').innerText = d.weather[0].description;
    document.getElementById('weatherIcon').src = `https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;

    document.getElementById('wContent').classList.add('show');
    map.flyTo([lat, lon], 10);
  }

  function getWeather() {
    const val = input.value;
    if(val) fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`)
      .then(r => r.json()).then(d => d[0] && fetchWeather(d[0].lat, d[0].lon));
  }
</script>
</body>
</html>
