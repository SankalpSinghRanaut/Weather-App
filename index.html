
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyWatch — Weather Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
    :root {
      --sky-deep:    #0b0f1a;
      --sky-mid:     #111827;
      --sky-card:    rgba(255,255,255,0.04);
      --sky-border:  rgba(255,255,255,0.08);
      --accent:      #7dd3fc;
      --accent-warm: #fbbf24;
      --text-primary: #f0f4ff;
      --text-muted:   #8898b0;
      --glow:        rgba(125, 211, 252, 0.15);
    }
 
    html, body {
      min-height: 100%;
      background: var(--sky-deep);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .forecast-row {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.forecast-card {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  width: 12%;
}


    .search-bar {
        margin-bottom: 48px;
    }

    .suggestions-dropdown {
        max-height: 250px;
        overflow-y: auto;
    }
    /* ── ANIMATED SKY BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(56,189,248,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(99,102,241,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 60% 30%, rgba(251,191,36,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
 
    /* ── STARS ── */
    .stars {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--max-op, 0.6); transform: scale(1); }
      50%       { opacity: 0.1; transform: scale(0.7); }
    }
 
    /* ── LAYOUT ── */
    .app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
    }
 
    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.8s ease both;
    }
    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent) 0%, #c7d2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 4px;
    }
 
    /* ── SEARCH ── */
    .search-wrap {
      width: 100%;
      max-width: 480px;
      margin-bottom: 32px;
      animation: fadeDown 0.8s 0.1s ease both;
    }
    .search-inner {
      display: flex;
      background: var(--sky-card);
      border: 1px solid var(--sky-border);
      border-radius: 50px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .search-inner:focus-within {
      border-color: rgba(125,211,252,0.4);
      box-shadow: 0 0 0 3px var(--glow);
    }
    .search-inner input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 22px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
    }
    .search-inner input::placeholder { color: var(--text-muted); }
    .search-inner button {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      padding: 10px 22px;
      margin: 4px;
      border-radius: 50px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
    }
    .search-inner button:hover  { opacity: 0.88; }
    .search-inner button:active { transform: scale(0.96); }
 
    /* ── MAIN CARD ── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--sky-card);
      border: 1px solid var(--sky-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      overflow: hidden;
      animation: fadeUp 0.7s 0.2s ease both;
      transition: box-shadow 0.4s;
    }
    .card.loaded {
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--sky-border);
    }
 
    /* ── TOP SECTION ── */
    .card-top {
      padding: 32px 32px 24px;
      position: relative;
    }
    .location-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      min-height: 22px;
    }
    .location-pin {
      width: 16px; height: 16px;
      fill: var(--accent);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .location-pin.visible { opacity: 1; }
    .city-name {
      font-size: 1rem;
      font-weight: 500;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .city-name.visible { opacity: 1; transform: none; }
    .date-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-left: auto;
      white-space: nowrap;
    }
 
    .temp-icon-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .temp-display {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(4.5rem, 14vw, 6rem);
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s, transform 0.5s;
    }
    .temp-display.visible { opacity: 1; transform: none; }
    .temp-unit { font-size: 0.35em; vertical-align: super; color: var(--text-muted); }
 
    .icon-wrap {
      width: 90px; height: 90px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.5s 0.1s;
    }
    .icon-wrap.visible { opacity: 1; }
    .icon-wrap img { width: 90px; height: 90px; filter: drop-shadow(0 4px 16px rgba(125,211,252,0.4)); }
 
    .condition {
      margin-top: 6px;
      font-size: 1rem;
      color: var(--text-muted);
      font-style: italic;
      text-transform: capitalize;
      min-height: 24px;
      opacity: 0;
      transition: opacity 0.4s 0.2s;
    }
    .condition.visible { opacity: 1; }
 
    .feels-like {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
      min-height: 18px;
      opacity: 0;
      transition: opacity 0.4s 0.25s;
    }
    .feels-like.visible { opacity: 1; }
 
    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--sky-border);
      margin: 0 32px;
    }
 
    /* ── STATS GRID ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
    }
    .stat {
      padding: 20px 28px;
      border-right: 1px solid var(--sky-border);
      border-bottom: 1px solid var(--sky-border);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .stat:nth-child(2n)  { border-right: none; }
    .stat:nth-last-child(-n+2) { border-bottom: none; }
    .stat.visible { opacity: 1; transform: none; }
    .stat:nth-child(1).visible { transition-delay: 0.05s; }
    .stat:nth-child(2).visible { transition-delay: 0.10s; }
    .stat:nth-child(3).visible { transition-delay: 0.15s; }
    .stat:nth-child(4).visible { transition-delay: 0.20s; }
 
    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .stat-label svg { width: 12px; height: 12px; fill: var(--accent); opacity: 0.7; }
    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .stat-unit { font-size: 0.7em; color: var(--text-muted); margin-left: 2px; font-family: 'DM Sans', sans-serif; }
 
    /* ── SUN TIMES ── */
    .sun-row {
      display: flex;
      justify-content: space-around;
      padding: 20px 28px;
      border-top: 1px solid var(--sky-border);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s 0.3s, transform 0.4s 0.3s;
    }
    .sun-row.visible { opacity: 1; transform: none; }
    .sun-item { text-align: center; }
    .sun-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .sun-label svg { width: 11px; height: 11px; fill: var(--accent-warm); }
    .sun-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--text-primary);
    }
 
    /* ── PLACEHOLDER ── */
    .placeholder {
      padding: 52px 32px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .placeholder-icon { font-size: 2.8rem; margin-bottom: 16px; opacity: 0.5; }
 
    /* ── LOADING ── */
    .loading {
      display: none;
      padding: 52px 32px;
      text-align: center;
    }
    .loading.active { display: block; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--sky-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--text-muted); font-size: 0.85rem; }
 
    /* ── ERROR ── */
    .error-msg {
      display: none;
      padding: 16px 20px;
      margin: 0 32px 20px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 0.85rem;
      text-align: center;
      animation: fadeDown 0.3s ease;
    }
    .error-msg.visible { display: block; }
 
    /* ── WEATHER DATA SECTIONS ── */
    .weather-data { display: none; }
    .weather-data.visible { display: block; }
 
    /* ── FOOTER ── */
    footer {
      margin-top: 28px;
      font-size: 0.72rem;
      color: var(--text-muted);
      opacity: 0.6;
      text-align: center;
      animation: fadeUp 0.8s 0.5s ease both;
    }
 
    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .app { padding: 32px 16px 48px; }
      .card-top { padding: 24px 22px 18px; }
      .divider { margin: 0 22px; }
      .stat { padding: 16px 20px; }
      .sun-row { padding: 16px 20px; }
      .error-msg { margin: 0 22px 16px; }
    }
  </style>
</head>
<body>
 
<div class="stars" id="stars"></div>
 
<div class="app">
 
  <header>
    <div class="brand">SkyWatch</div>
    <div class="brand-sub">Weather Forecast Application</div>
  </header>
 
  <div class="search-wrap">
    <div class="search-inner">
      <input type="text" id="cityInput" placeholder="Search city or town…" autocomplete="off"
             onkeydown="if(event.key==='Enter') getWeather()">
      <button onclick="getWeather()">Search</button>
    </div>
  </div>
 
  <div class="card" id="card">
 
    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Fetching weather data…</p>
    </div>
 
    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>
 
    <!-- Placeholder -->
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">🌤</div>
      Enter a city name to get<br>real-time weather information.
    </div>
 
    <!-- Weather Content -->
    <div class="weather-data" id="weatherData">
 
      <div class="card-top">
        <div class="location-row">
          <svg class="location-pin" id="locPin" viewBox="0 0 24 24">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          <span class="city-name" id="cityDisplay">--</span>
          <span class="date-label" id="dateLabel"></span>
        </div>
 
        <div class="temp-icon-row">
          <div class="temp-display" id="tempDisplay">--<span class="temp-unit">°C</span></div>
          <div class="icon-wrap" id="iconWrap">
            <img id="weatherIcon" src="" alt="weather icon">
          </div>
        </div>
 
        <div class="condition" id="condition">--</div>
        <div class="feels-like" id="feelsLike"></div>
      </div>
 
      <div class="divider"></div>
 
      <div class="stats">
        <div class="stat" id="s1">
          <div class="stat-label">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
            Humidity
          </div>
          <div class="stat-value" id="humidity">--<span class="stat-unit">%</span></div>
        </div>
 
        <div class="stat" id="s2">
          <div class="stat-label">
            <svg viewBox="0 0 24 24"><path d="M14.5 2.5c0 1.5-1.5 7-1.5 7h-2C10 9.5 8.5 4 8.5 2.5a3 3 0 016 0zM11 19v3h2v-3c2.76-.55 5-3.03 5-5.5h-2c0 1.93-1.57 3.5-3.5 3.5S9 15.43 9 13.5H7c0 2.47 2.24 4.95 4 5.5z"/></svg>
            Pressure
          </div>
          <div class="stat-value" id="pressure">--<span class="stat-unit">hPa</span></div>
        </div>
 
        <div class="stat" id="s3">
          <div class="stat-label">
            <svg viewBox="0 0 24 24"><path d="M14 6c0-1.1-.9-2-2-2s-2 .9-2 2c0 .74.4 1.38 1 1.73V12h2V7.73c.6-.35 1-.99 1-1.73zM11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
            Wind Speed
          </div>
          <div class="stat-value" id="windSpeed">--<span class="stat-unit">km/h</span></div>
        </div>
 
        <div class="stat" id="s4">
          <div class="stat-label">
            <svg viewBox="0 0 24 24"><path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 15 6.7 12H5c0 3.42 2.72 6.23 6 6.72V22h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            Visibility
          </div>
          <div class="stat-value" id="visibility">--<span class="stat-unit">km</span></div>
        </div>
      </div>
 
      <div class="sun-row" id="sunRow">
        <div class="sun-item">
          <div class="sun-label">
            <svg viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
            Sunrise
          </div>
          <div class="sun-value" id="sunrise">--</div>
        </div>
        <div style="width:1px; background: var(--sky-border);"></div>
        <div class="sun-item">
          <div class="sun-label">
            <svg viewBox="0 0 24 24"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zm-2 5.79V18h-3.52L12 20.48 9.52 18H6v-3.52L3.52 12 6 9.52V6h3.52L12 3.52 14.48 6H18v3.52L20.48 12 18 14.48zM12 6.5c-3.03 0-5.5 2.47-5.5 5.5s2.47 5.5 5.5 5.5 5.5-2.47 5.5-5.5-2.47-5.5-5.5-5.5z"/></svg>
            Sunset
          </div>
          <div class="sun-value" id="sunset">--</div>
        </div>
      </div>
 
    </div><!-- /weather-data -->
  </div><!-- /card -->
 
  <footer> 2026 </footer>
 
</div>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<div id="map" style="width:100%; max-width:480px; height:260px; margin-top:20px; border-radius:20px; overflow:hidden; border:1px solid rgba(255,255,255,0.08);"></div>

<script>
const apiKey = "6fc7ab730ad632df5a169986dcef4805";

/* ── STAR FIELD ── */
const starsContainer = document.getElementById("stars");
for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.width = s.style.height = Math.random() * 2 + "px";
    s.style.top = Math.random() * 100 + "%";
    s.style.left = Math.random() * 100 + "%";
    s.style.setProperty('--dur', (2 + Math.random() * 3) + "s");
    s.style.setProperty('--delay', Math.random() * 3 + "s");
    starsContainer.appendChild(s);
}

/* ── DATE ── */
function setDate() {
    const d = new Date();
    document.getElementById("dateLabel").innerText =
        d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
}
setDate();

/* ── UI HELPERS ── */
function showLoading() {
    loadingState.classList.add("active");
    placeholder.style.display = "none";
    weatherData.classList.remove("visible");
    errorMsg.classList.remove("visible");
}
function hideLoading() {
    loadingState.classList.remove("active");
}
function showError(msg) {
    errorMsg.innerText = msg;
    errorMsg.classList.add("visible");
}
function showWeatherUI() {
    weatherData.classList.add("visible");
    document.querySelectorAll('.stat').forEach(el => el.classList.add('visible'));
    locPin.classList.add("visible");
    cityDisplay.classList.add("visible");
    tempDisplay.classList.add("visible");
    iconWrap.classList.add("visible");
    condition.classList.add("visible");
    feelsLike.classList.add("visible");
    sunRow.classList.add("visible");
}

/* ── WEATHER FETCH BY CITY ── */
async function getWeather() {
    const city = cityInput.value.trim();
    if (!city) return;

    showLoading();

    try {
        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`
        );
        if (!res.ok) throw new Error("City not found");

        const data = await res.json();
        updateUI(data);

        // move map
        map.setView([data.coord.lat, data.coord.lon], 8);

    } catch (e) {
        showError("Unable to fetch weather data.");
    }

    hideLoading();
}

/* ── WEATHER FETCH BY COORD ── */
async function getWeatherByCoords(lat, lon) {
    showLoading();

    try {
        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`
        );
        const data = await res.json();
        updateUI(data);

    } catch {
        showError("Failed to fetch weather for location.");
    }

    hideLoading();
}

/* ── UPDATE UI ── */
function updateUI(data) {
    cityDisplay.innerText = data.name;
    tempDisplay.innerHTML = `${Math.round(data.main.temp)}<span class="temp-unit">°C</span>`;
    condition.innerText = data.weather[0].description;
    feelsLike.innerText = `Feels like ${Math.round(data.main.feels_like)}°C`;

    humidity.innerHTML = `${data.main.humidity}<span class="stat-unit">%</span>`;
    pressure.innerHTML = `${data.main.pressure}<span class="stat-unit">hPa</span>`;
    windSpeed.innerHTML = `${Math.round(data.wind.speed * 3.6)}<span class="stat-unit">km/h</span>`;
    visibility.innerHTML = `${(data.visibility / 1000).toFixed(1)}<span class="stat-unit">km</span>`;

    weatherIcon.src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

    sunrise.innerText = formatTime(data.sys.sunrise);
    sunset.innerText = formatTime(data.sys.sunset);

    showWeatherUI();
}

/* ── TIME FORMAT ── */
function formatTime(ts) {
    return new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
}

/* ── MAP INIT ── */
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: ''
}).addTo(map);

let marker;

/* ── MAP CLICK EVENT ── */
map.on('click', function(e) {
    const { lat, lng } = e.latlng;

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);

    getWeatherByCoords(lat, lng);
});
</script>

</body>
</html>
